name: Snake Game

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=22D3EE&color_dots=0d1117,1e3a5f,6366F1,8B5CF6,22D3EE
            dist/github-snake-dark.svg?palette=github-dark&color_snake=22D3EE&color_dots=0d1117,1e3a5f,6366F1,8B5CF6,22D3EE

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

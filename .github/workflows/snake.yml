name: Snake Game

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-light.svg?color_snake=cyan
            dist/snake-dark.svg?palette=github-dark&color_snake=cyan

      - name: Fix snake color in SVGs
        run: |
          sed -i 's/--cs:cyan/--cs:#22D3EE/g' dist/snake-dark.svg
          sed -i 's/--cs:cyan/--cs:#22D3EE/g' dist/snake-light.svg
          ls -la dist/
          grep -o '\-\-cs:[^;]*' dist/snake-dark.svg

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
